<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IntegrApex - Sistema de Gestion Tecnico-Administrativa de Contratos</title>
  <link rel="stylesheet" href="/style.css?v=100">
  <!-- Material Icons & Google Fonts -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
</head>
<body>

  <!-- Root Layout Container -->
  <div id="root-layout">
    <!-- Top Header -->
    <header id="app-header" style="display: none;">
      <div class="brand">
        <button class="menu-toggle-btn" id="sidebar-toggle">
          <span class="material-icons-round">menu</span>
        </button>
        <div class="brand-icon">I</div>
        <div>
          <div class="brand-title">IntegrApex</div>
          <div class="brand-subtitle">IPN - ESCOM</div>
        </div>
      </div>
      
      <div class="header-center-info">
        <span class="header-pill select-contract-pill" id="current-contract-selector" style="display: none;">
          <span class="material-icons-round" style="font-size: 16px;">assignment</span>
          <span id="header-contract-folio">Seleccione Contrato</span>
        </span>
        <span class="header-pill">
          <span class="material-icons-round" style="font-size: 16px;">today</span>
          <span id="header-date">08 Jul 2026</span>
        </span>
      </div>

      <div class="nav-user">
        <span class="user-badge" id="header-user-badge">Invitado</span>
        <button class="btn btn-secondary btn-sm" onclick="app.logout()" id="logout-btn">
          <span class="material-icons-round" style="font-size: 16px;">logout</span>
          Salir
        </button>
      </div>
    </header>

    <div class="body-wrapper">
      <!-- Sidebar Navigation -->
      <aside id="app-sidebar" class="sidebar" style="display: none;">
        <!-- Navigation Links injected dynamically -->
      </aside>

      <!-- Main Router Outlet Content Area -->
      <main id="app-router-outlet">
        <!-- Injected screens -->
      </main>
    </div>
  </div>

  <!-- Global Modal Container -->
  <div id="modal-container" class="modal-backdrop" style="display: none;">
    <div class="modal-content glass-panel" id="modal-content-outlet">
      <!-- Modal contents injected dynamically -->
    </div>
  </div>

  <!-- Toast Notification Container -->
  <div id="toast" class="toast">
    <span class="material-icons-round" id="toast-icon">info</span>
    <span id="toast-text">Mensaje</span>
  </div>

  <!-- App script -->
  <script src="/js/modules/contratos.js?v=100"></script>
  <script src="/js/modules/expediente.js?v=100"></script>
  <script src="/js/modules/fianzas.js?v=100"></script>
  <script src="/js/modules/convenios.js?v=100"></script>
  <script src="/js/modules/documentos.js?v=100"></script>
  <script src="/js/modules/bitacora.js?v=100"></script>
  <script src="/js/modules/estimaciones.js?v=100"></script>
  <script src="/js/modules/portafolio.js?v=100"></script>
  <script src="/js/modules/programa.js?v=100"></script>
  <script src="/app_v99.js?v=100"></script>
</body>
</html>
