<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IntegrApex - Sistema de Gestión Técnico-Administrativa de Contratos</title>
  <link rel="stylesheet" href="/style.css?v=113">
  <!-- Material Icons & Google Fonts -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
</head>
<body>

  <!-- Root Layout Container -->
  <div id="root-layout">
    <!-- Top Header -->
    <header id="app-header" style="display: none;">
      <div class="brand">
        <button class="menu-toggle-btn" id="sidebar-toggle">
          <span class="material-icons-round">menu</span>
        </button>
        <div class="brand-icon">I</div>
        <div>
          <div class="brand-title">IntegrApex</div>
          <div class="brand-subtitle">IPN - ESCOM</div>
        </div>
      </div>
      
      <div class="header-center-info">
        <span class="header-pill select-contract-pill" id="current-contract-selector" style="display: none;">
          <span class="material-icons-round" style="font-size: 16px;">assignment</span>
          <span id="header-contract-folio">Seleccione Contrato</span>
        </span>
        <span class="header-pill">
          <span class="material-icons-round" style="font-size: 16px;">today</span>
          <span id="header-date">08 Jul 2026</span>
        </span>
      </div>

      <div class="nav-user">
        <div style="position: relative;">
          <button class="btn btn-secondary btn-sm" id="notif-bell-btn" onclick="app.toggleNotifDropdown()" title="Notificaciones" style="position: relative;">
            <span class="material-icons-round" style="font-size: 18px;">notifications</span>
            <span id="notif-unread-badge" style="display:none; position:absolute; top:-4px; right:-4px; background:#dc2626; color:white; border-radius:999px; font-size:10px; font-weight:700; min-width:16px; height:16px; line-height:16px; text-align:center; padding:0 3px;">0</span>
          </button>
          <div id="notif-dropdown" class="glass-panel" style="display:none; position:absolute; top:calc(100% + 8px); right:0; width:360px; max-height:420px; overflow-y:auto; z-index:1000; padding:0;"></div>
        </div>
        <span class="user-badge" id="header-user-badge">Invitado</span>
        <button class="btn btn-secondary btn-sm" onclick="app.logout()" id="logout-btn">
          <span class="material-icons-round" style="font-size: 16px;">logout</span>
          Salir
        </button>
      </div>
    </header>

    <div class="body-wrapper">
      <!-- Sidebar Navigation -->
      <aside id="app-sidebar" class="sidebar" style="display: none;">
        <!-- Navigation Links injected dynamically -->
      </aside>

      <!-- Main Router Outlet Content Area -->
      <main id="app-router-outlet">
        <!-- Injected screens -->
      </main>
    </div>
  </div>

  <!-- Global Modal Container -->
  <div id="modal-container" class="modal-backdrop" style="display: none;">
    <div class="modal-content glass-panel" id="modal-content-outlet">
      <!-- Modal contents injected dynamically -->
    </div>
  </div>

  <!-- Toast Notification Container -->
  <div id="toast" class="toast">
    <span class="material-icons-round" id="toast-icon">info</span>
    <span id="toast-text">Mensaje</span>
  </div>

  <!-- App script -->
  <script src="/js/core/api.js?v=106"></script>
  <script src="/js/core/ui.js?v=106"></script>
  <script src="/js/core/router.js?v=106"></script>
  <script src="/js/core/layout.js?v=106"></script>
  <script src="/js/modules/auth.js?v=106"></script>
  <script src="/js/modules/inicio.js?v=106"></script>
  <script src="/js/modules/admin.js?v=106"></script>
  <script src="/js/modules/contratosShell.js?v=107"></script>
  <script src="/js/modules/archivoFotografico.js?v=1"></script>
  <script src="/js/modules/contratos.js?v=117"></script>
  <script src="/js/modules/catalogo.js?v=107"></script>
  <script src="/js/modules/expediente.js?v=108"></script>
  <script src="/js/modules/fianzas.js?v=106"></script>
  <script src="/js/modules/convenios.js?v=106"></script>
  <script src="/js/modules/documentos.js?v=106"></script>
  <script src="/js/modules/bitacora.js?v=106"></script>
  <script src="/js/modules/estimaciones.js?v=112"></script>
  <script src="/js/modules/portafolio.js?v=106"></script>
  <script src="/js/modules/programa.js?v=106"></script>
  <script src="/js/modules/notificaciones.js?v=107"></script>
  <script src="/app_v99.js?v=106"></script>
</body>
</html>
